<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>King G - Lifestyle & Lounge</title>
    <style>
      /* Critical: prevent white flash and show loading until React mounts */
      html, body { margin: 0; min-height: 100vh; background: #1a1d24; color: #e8e4dc; font-family: Inter, system-ui, sans-serif; }
      #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      #root:empty::after { content: "Loading King G…"; font-size: 1.125rem; color: #a8a29e; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // If React hasn't mounted after 5s, show help (e.g. script error or wrong URL)
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          root.innerHTML = '<div style="text-align:center;padding:2rem;max-width:400px;margin:0 auto"><p style="color:#a8a29e;margin-bottom:1rem">The app didn’t load.</p><p style="color:#78716c;font-size:0.875rem;margin-bottom:1.5rem">Open Developer Tools (F12), go to the Console tab, and check for red errors. Then try a hard refresh: Ctrl+Shift+R (Windows) or Cmd+Shift+R (Mac).</p><button onclick="location.reload()" style="padding:0.5rem 1rem;background:#b8956e;color:#1a1d24;border:none;border-radius:0.5rem;cursor:pointer;font-weight:500">Reload</button></div>';
        }
      }, 5000);
    </script>
  </body>
</html>
